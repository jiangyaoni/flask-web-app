{% extends "base.html" %}

{% block title %}用户注册{% endblock %}

{% block content %}
    <h1>
        <span class="emoji">📝</span><br>
        用户注册
    </h1>

    {% if error %}
        <div style="background: #fed7d7; color: #c53030; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;">
            ❌ {{ error }}
        </div>
    {% endif %}

    <form method="POST" style="text-align: left; max-width: 300px; margin: 0 auto;">
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">用户名</label>
            <input type="text" name="username" placeholder="请设置用户名" required
                   style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">密码</label>
            <input type="password" name="password" placeholder="请设置密码" required
                   style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <button type="submit"
                style="width: 100%; padding: 12px; background: #38a169; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
                onmouseover="this.style.background='#2f855a'" onmouseout="this.style.background='#38a169'">
            注 册
        </button>
    </form>

    <div style="margin-top: 20px; font-size: 14px; color: #4a5568;">
        已有账号？<a href="/login" style="color: #2b6cb0; text-decoration: none; font-weight: 600;">去登录</a>
    </div>
    <div class="hint">
        <a href="/" style="color: #2b6cb0; text-decoration: none;">← 返回首页</a>
    </div>
{% endblock %}
