{% extends "base.html" %}

{% block title %}首页 - 我的网站{% endblock %}

{% block content %}
    <h1>
        <span class="emoji">🚀</span><br>
        欢迎来到我的网站
    </h1>
    <p style="color: #4a5568; font-size: 18px; margin-top: 8px;">
        一个由 <strong>Flask + Redis</strong> 驱动的极简 Web 应用
    </p>
    <hr>
    <div style="font-size: 15px; color: #4a5568; line-height: 1.8;">
        <p>📊 查看实时访问统计</p>
        <p style="font-size: 13px; color: #a0aec0;">
            （点击下方按钮即可进入统计页面）
        </p>
    </div>
    <div class="links">
        <a href="/count">📈 查看统计</a>
    </div>
    <div class="hint">
        💡 提示：在 URL 后加 <code>?user=你的名字</code> 可模拟不同用户
    </div>
{% endblock %}
