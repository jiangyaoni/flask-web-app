{% extends "base.html" %}

{% block title %}编辑《{{ post.title }}》{% endblock %}

{% block content %}
    <div style="text-align: left;">
        <h1 style="font-size: 28px; font-weight: 700; color: #1a202c; margin: 0 0 20px 0;">✏️ 编辑文章</h1>

        {% if error %}
            <div style="background: #fed7d7; color: #c53030; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;">
                ❌ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">标题</label>
                <input type="text" name="title" value="{{ post.title }}" required
                       style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                       onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">内容</label>
                <textarea name="content" required
                          style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; min-height: 300px; outline: none; transition: border 0.2s; resize: vertical;"
                          onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">{{ post.content }}</textarea>
            </div>

            <div style="display: flex; gap: 12px;">
                <button type="submit" style="padding: 10px 32px; background: #2b6cb0; color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#2c5282'" onmouseout="this.style.background='#2b6cb0'">
                    💾 保存修改
                </button>
                <a href="{{ url_for('blog_detail', post_id=post.id) }}" style="padding: 10px 32px; background: #edf2f7; color: #4a5568; text-decoration: none; border-radius: 30px; font-size: 16px; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#edf2f7'">
                    取消
                </a>
            </div>
        </form>
    </div>
{% endblock %}
