{% extends "base.html" %}

{% block title %}发布新文章{% endblock %}

{% block content %}
    <div style="text-align: left;">
        <h1 style="font-size: 28px; font-weight: 700; color: #1a202c; margin: 0 0 20px 0;">✍️ 发布新文章</h1>

        {% if error %}
            <div style="background: #fed7d7; color: #c53030; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;">
                ❌ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">文章标题</label>
                <input type="text" name="title" placeholder="输入一个吸引眼球的标题..." required
                       style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                       onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
            </div>

            <!-- 分类选择 -->
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">分类</label>
                <select name="category_id" style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; background: white;">
                    <option value="">未分类</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 标签选择 -->
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">标签（可多选）</label>
                <select name="tag_ids" multiple style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; background: white; min-height: 80px;">
                    {% for tag in tags %}
                        <option value="{{ tag.id }}">{{ tag.name }}</option>
                    {% endfor %}
                </select>
                <div style="font-size: 12px; color: #a0aec0; margin-top: 4px;">按住 Ctrl 键点击可多选</div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">文章内容</label>
                <textarea name="content" placeholder="在这里写下你的想法..." required
                          style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; min-height: 300px; outline: none; transition: border 0.2s; resize: vertical;"
                          onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'"></textarea>
            </div>

            <div style="display: flex; gap: 12px;">
                <button type="submit" style="padding: 10px 32px; background: #2b6cb0; color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#2c5282'" onmouseout="this.style.background='#2b6cb0'">
                    📢 发布文章
                </button>
                <a href="{{ url_for('blog_index') }}" style="padding: 10px 32px; background: #edf2f7; color: #4a5568; text-decoration: none; border-radius: 30px; font-size: 16px; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#edf2f7'">
                    取消
                </a>
            </div>
        </form>
    </div>
{% endblock %}
