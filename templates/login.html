{% extends "base.html" %}

{% block title %}用户登录{% endblock %}

{% block content %}
    <h1>
        <span class="emoji">🔐</span><br>
        用户登录
    </h1>

    {% if error %}
        <div style="background: #fed7d7; color: #c53030; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;">
            ❌ {{ error }}
        </div>
    {% endif %}

    <form method="POST" style="text-align: left; max-width: 300px; margin: 0 auto;">
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">账号</label>
            <input type="text" name="username" placeholder="请输入账号" required
                   style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px;">密码</label>
            <input type="password" name="password" placeholder="请输入密码" required
                   style="width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;"
                   onfocus="this.style.borderColor='#2b6cb0'" onblur="this.style.borderColor='#e2e8f0'">
        </div>
        <button type="submit"
                style="width: 100%; padding: 12px; background: #2b6cb0; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
                onmouseover="this.style.background='#2c5282'" onmouseout="this.style.background='#2b6cb0'">
            登 录
        </button>
    </form>

    <div style="margin-top: 20px; font-size: 14px; color: #a0aec0;">
        💡 测试账号：<code>admin</code> / 密码 <code>123</code> 或 <code>user</code> / 密码 <code>123</code>
    </div>
    <div class="hint">
        <a href="/" style="color: #2b6cb0; text-decoration: none;">← 返回首页</a>
    </div>
{% endblock %}
